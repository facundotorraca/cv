name: Build FT CV PDFs

on:
  push:
    branches: [ master ]
    paths: [ 'ft/**' ]
  pull_request:
    branches: [ master ]
    paths: [ 'ft/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Compile LaTeX documents
      uses: xu-cheng/latex-action@v3
      with:
        root_file: |
          cv-en.tex
          cv-es.tex
          cv-pt.tex
        working_directory: ft
        args: -pdf -interaction=nonstopmode -file-line-error

    - name: "[EN] Upload CV"
      uses: actions/upload-artifact@v4
      with:
        name: ft-cv-en
        path: ft/cv-en.pdf

    - name: "[ES] Upload CV"
      uses: actions/upload-artifact@v4
      with:
        name: ft-cv-es
        path: ft/cv-es.pdf

    - name: "[PT] Upload CV"
      uses: actions/upload-artifact@v4
      with:
        name: ft-cv-pt
        path: ft/cv-pt.pdf

    - name: Create Release on Tag
      if: startsWith(github.ref, 'refs/tags/ft-')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ft/cv-en.pdf
          ft/cv-es.pdf
          ft/cv-pt.pdf
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
